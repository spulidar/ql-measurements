project:
  name: "MILGRAU"
  station_name: "SPU-Lidar"
  institution: "IPEN/USP"
  timezone: "America/Sao_Paulo"

processing:
  incremental: true
  interactive_qa: true
  console_level: "INFO"
  file_level: "INFO"
  laser_shot_tolerance_fraction: 0.002
  dark_current_max_association_hours: 12.0
  quarantine_spurious_files: true
  delete_spurious_files: false
  spurious_extensions: [ ".dpp", ".zip", ".txt"]
  quarantine_dir: "01-data/_quarantine"
  max_workers_io: 1
  max_workers_cpu: 1

directories:
  raw_data: "01-data"
  processed_data: "02-processed_data"
  site_output: "measurements"
  log_dir: "logs"

