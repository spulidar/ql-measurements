  longitude: -46.7383
  vertical_resolution_m: 7.5
  speed_of_light_m_s: 299792458.0
  speed_of_light: 299792458.0
  default_surface_temp_c: 25.0
  default_surface_pressure_hpa: 940.0
  bg_start_m: 29000.0
  bg_stop_m: 29999.0
