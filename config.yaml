# ==========================================
# MILGRAU Suite Configuration File
# ==========================================

processing:
  incremental: false
  apply_cloud_mask: true
  cloud_mask_multiplier: 10.0
  interactive_qa: true                # Set to true to show pop-up plots (Gluing/Molecular fit)
  save_intermediate_corrected: true

directories:
  raw_data: "01-data"
  processed_data: "02-processed_data"
  site_output: "ql-measurements"
  log_dir: "logs"

physics:
  # Base properties
  vertical_resolution_m: 7.5
  speed_of_light: 299792458.0

  # Station Location (IPEN/USP - São Paulo)
  latitude: -23.5615
  longitude: -46.7383
  
  # Default surface weather for Level 0 NetCDF SCC format (Fallback)
  default_surface_temp_c: 25.0
  default_surface_pressure_hpa: 940.0

  # PBL detection boundaries
  pbl_min_search_m: 500.0
  pbl_max_search_m: 4000.0
  
  # SCC Channel constants: [deadtime_us, bin_shift, bg_offset_mV]
  channels:
    "00355.o_ph": [0.0020, -2, 0.0005]
    "00355.o_an": [0.0000,  8, 0.0000]
    "00387.o_ph": [0.0000, -2, 0.0000]
    "00387.o_an": [0.0000,  8, 0.0000]
    "00408.o_ph": [0.0000, -2, 0.0000]
    "00408.o_an": [0.0000,  8, 0.0000]
    "00530.o_ph": [0.0000, -2, 0.0015]
    "00530.o_an": [0.0000,  7, 0.0000]
    "00532.o_ph": [0.0035, -3, 0.0015]
    "00532.o_an": [0.0000,  6, 0.0000]
    "01064.o_ph": [0.0000,  0, 0.0000]
    "01064.o_an": [0.0000,  1, 0.0000]

visualization:
  altitude_ranges_km: [5, 15, 30]
  channels_to_plot:
    - "01064.o_an"
    - "00532.o_an"
    - "00532.o_ph"
    - "00355.o_an"
    - "00355.o_ph"

hardware:
  id_to_name:
    934: "01064.o_an"
    935: "01064.o_ph"
    722: "00532.o_an"
    1593: "00532.o_an"
    716: "00532.o_ph"
    1558: "00530.o_an"
    1595: "00530.o_an"
    1557: "00530.o_ph"
    737: "00355.o_an"
    1594: "00355.o_an"
    736: "00355.o_ph"
    749: "00387.o_an"
    1596: "00387.o_an"
    748: "00387.o_ph"
    1446: "00408.o_an"
    1447: "00408.o_ph"

# ==========================================
# PHASE 2: INVERSION & RADIOSONDE (LEBEAR)
# ==========================================

radiosonde:
  station_id: "83779"                 # Wyoming ID for São Paulo (Campo de Marte)
  fallback_to_standard: true          # Use US Standard Atmosphere if download fails
  
inversion:
  monte_carlo_iterations: 100         # Number of perturbations for error propagation
  
  molecular_fit:
    ref_alt_min_m: 5000.0             # Initial altitude range for molecular calibration
    ref_alt_max_m: 9000.0             # Final altitude range for molecular calibration
    lidar_ratio_molecular: 8.37758    # Standard Rayleigh LR (8 * pi / 3)
  
  gluing:
    window_length_bins: 150
    correlation_threshold: 0.95
    intercept_threshold: 0.5
    gaussian_threshold: 0.1
    minmax_threshold: 0.5
    search_min_idx: 400               # 400 * 7.5m = 3 km
    search_max_idx: 1000              # 1000 * 7.5m = 7.5 km


  # Mean Aerosol Lidar Ratios (LR) per wavelength and month (01 to 12)
  lidar_ratios:
