  station_name: "Campo de Marte"
  fallback_to_standard_atmosphere: true
  fallback_to_standard: true
  cache_dir: "01-data/wyoming_cache"

surface_weather:
  provider: "open-meteo"
  cache_dir: "01-data/openmeteo_cache"
  fallback_to_config_defaults: true

visualization:
  output_format: "webp"
  dpi: 120
  altitude_ranges_km: [5, 15, 30]
  channels_to_plot:
    - "1064.AN"
    - "532.AN"
    - "532.PC"
    - "355.PC"
    - "355.AN"
  quicklook:
    show_pbl: true
    show_tropopause: true
    mean_profile_smooth_bins: 20
  level2_qa:
    enabled: true
    max_altitude_km: 30.0
    generate_gluing_qa: true
    generate_molecular_fit_qa: true
    generate_kfs_qa: true

inversion:
  enabled: true
  interactive_qa: true
  wavelengths_to_process: [355, 532]
  temporal_average_minutes: 15
  kfs_mode: "two_sided"   # options: backward, two_sided
  products:
    save_glued_signal: true
    save_molecular_profile: true
    save_aerosol_backscatter: true
    save_aerosol_extinction: true
    save_uncertainty: true
    save_quality_flags: true
  monte_carlo_iterations: 300
  random_seed: 143
  beta_ref_relative_std: 0.10
  aerosol_ref_fraction: 0.0
  min_lidar_ratio_sr: 10.0
  allow_negative_aerosol: false
  molecular_fit:
    ref_alt_min_m: 15000.0
    ref_alt_max_m: 22000.0
    ref_window_bins: 100
    lidar_ratio_molecular_sr: 8.377580409572781
    lidar_ratio_molecular: 8.377580409572781
    max_relative_slope: 0.05
    max_relative_variance: 0.10
    min_valid_fraction: 0.50
  gluing:
    enabled: true
    window_length_bins: 120
    correlation_threshold: 0.90
    intercept_threshold: 5.0
    gaussian_threshold: 2.0
    minmax_threshold: 2.0
    search_min_idx: 80      # 80 * 7.5 m = 0.6 km
    search_max_idx: 500     # 500 * 7.5 m = 3.75 km
    fallback_to_photon_counting: true
  cloud_screening:
    enabled: true
    min_altitude_m: 500.0
    max_altitude_m: 15000.0
    smooth_bins: 9
    snr_threshold: 8.0
    robust_z_threshold: 6.0
    min_cloud_bins: 3
    vertical_dilation_bins: 2
    exclude_clouds_from_reference_fit: true
    stop_kfs_below_optically_thick_clouds: true
  lidar_ratio_std_sr:
    "355": 15.0
    "532": 10.0
    "1064": 10.0
